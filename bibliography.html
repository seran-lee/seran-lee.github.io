  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet" />

    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#607AFB",
            "background-light": "#f5f6f8",
            "background-dark": "#0f1323",
          },
          fontFamily: {
            display: ["Noto Serif", "serif"],
            sans: ["Noto Sans", "sans-serif"],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: "Noto Serif", serif; }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
  <!-- GNB -->
  <div id="gnb"></div>

  <!-- Main Content -->
  <main class="max-w-4xl mx-auto px-6 py-12 lg:py-20">
    <!-- Page Header -->
    <section class="text-center mb-12">
      <h1 class="text-4xl font-bold tracking-tight mb-4">Publications</h1>
    </section>

    <!-- Category Filter -->
    <div class="flex flex-wrap justify-center gap-3 mb-6">
      <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-primary text-white border border-transparent" data-filter="all" onclick="filterByCategory('all', this)">
        All
      </button>
      <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:text-primary transition-colors border border-slate-200 dark:border-slate-700" data-filter="Articles" onclick="filterByCategory('Articles', this)">
        Journal Articles
      </button>
      <button class="filter-btn px-4 py-2 rounded-full text-sm font-medium bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:text-primary transition-colors border border-slate-200 dark:border-slate-700" data-filter="Presentations" onclick="filterByCategory('Presentations', this)">
        Presentations
      </button>
    </div>

    <!-- Keyword Filter -->
    <div class="flex flex-wrap justify-center gap-2 mb-12" id="keyword-filters">
      <!-- 키워드 태그가 여기에 동적으로 생성됩니다 -->
    </div>

    <!-- Publications List -->
    <section class="rounded-xl border border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 overflow-hidden" id="publications-list">
      <!-- publications.yml 데이터가 여기에 렌더링됩니다 -->
    </section>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-16 text-slate-500">
      <span class="material-symbols-outlined text-4xl mb-4">search_off</span>
      <p>No publications found in this category.</p>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <!-- 공통 컴포넌트 -->
  <script src="assets/js/components.js"></script>
  <script>
    let allPublications = [];
    let citationData = {};
    let activeCategory = 'all';
    let activeKeyword = null;

    function getCitationCount(pub) {
      if (!pub.link || !citationData.works) return null;
      const doi = pub.link.replace('https://doi.org/', 'https://doi.org/');
      return citationData.works[doi]?.cited_by_count ?? null;
    }

    function renderPublications(publications) {
      const list = document.getElementById('publications-list');
      if (publications.length === 0) {
        list.classList.add('hidden');
        document.getElementById('empty-state').classList.remove('hidden');
        return;
      }
      list.classList.remove('hidden');
      document.getElementById('empty-state').classList.add('hidden');

      list.innerHTML = publications.map((pub, idx) => `
        <article class="publication-item p-6 border-b border-slate-100 dark:border-slate-800 last:border-b-0 hover:bg-slate-50/50 dark:hover:bg-slate-800/30 transition-colors" data-category="${pub.category}">
          <div class="flex flex-col md:flex-row md:items-start md:justify-between gap-4">
            <div class="flex-1">
              <div class="flex items-center gap-3 mb-2">
                <span class="text-xs font-semibold uppercase tracking-wider px-2 py-1 rounded bg-primary/10 text-primary">
                  ${pub.category}
                </span>
                <span class="text-sm text-slate-500">${pub.year}</span>
                ${(() => { const c = getCitationCount(pub); return c !== null && c > 0 ? `<span class="text-xs text-slate-400 dark:text-slate-500">${c} citations</span>` : ''; })()}
              </div>
              <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-1">${pub.title}</h3>
              ${pub.title_ko ? `<h4 class="text-md font-medium text-slate-600 dark:text-slate-400 mb-2">${pub.title_ko}</h4>` : ''}
              <p class="text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">${pub.author}</p>
              <p class="text-sm text-slate-500 dark:text-slate-400 italic">${pub.publisher}</p>
              ${pub.keywords && pub.keywords.length > 0 ? `
              <div class="flex flex-wrap gap-1.5 mt-3">
                ${pub.keywords.map(k => `<span class="text-xs px-2 py-0.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400">${k}</span>`).join('')}
              </div>` : ''}
              ${pub.abstract ? `
              <div class="mt-3">
                <button onclick="toggleAbstract(${idx})" class="inline-flex items-center gap-1 text-xs text-primary font-medium hover:underline">
                  <span class="material-symbols-outlined text-sm" id="abstract-icon-${idx}">expand_more</span>
                  Abstract
                </button>
                <p id="abstract-${idx}" class="hidden mt-2 text-sm text-slate-600 dark:text-slate-400 leading-relaxed pl-1 border-l-2 border-primary/30">${pub.abstract}</p>
              </div>` : ''}
            </div>
            ${pub.link && pub.link !== '#' ? `
            <div class="flex items-center gap-3 md:flex-shrink-0 mt-3 md:mt-0">
              <a href="${pub.link}" target="_blank" rel="noopener noreferrer"
                 class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-primary text-white text-sm font-medium hover:bg-primary/90 transition-colors shadow-sm">
                <span class="material-symbols-outlined text-sm">open_in_new</span>
                View
              </a>
            </div>
            ` : ''}
          </div>
        </article>
      `).join('');
    }

    function toggleAbstract(idx) {
      const el = document.getElementById(`abstract-${idx}`);
      const icon = document.getElementById(`abstract-icon-${idx}`);
      el.classList.toggle('hidden');
      icon.textContent = el.classList.contains('hidden') ? 'expand_more' : 'expand_less';
    }

    function collectKeywords(publications) {
      const keywords = new Set();
      publications.forEach(p => (p.keywords || []).forEach(k => keywords.add(k)));
      return [...keywords].sort();
    }

    function renderKeywordFilters(keywords) {
      const container = document.getElementById('keyword-filters');
      container.innerHTML = keywords.map(k => `
        <button class="keyword-btn px-3 py-1 rounded-full text-xs font-medium border transition-colors
          ${activeKeyword === k
            ? 'bg-primary text-white border-transparent'
            : 'bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 border-slate-200 dark:border-slate-700 hover:text-primary hover:border-primary/50'}"
          onclick="filterByKeyword('${k}', this)">${k}</button>
      `).join('');
    }

    function applyFilters() {
      let filtered = allPublications;
      if (activeCategory !== 'all') {
        filtered = filtered.filter(p => p.category === activeCategory);
      }
      if (activeKeyword) {
        filtered = filtered.filter(p => (p.keywords || []).includes(activeKeyword));
      }
      renderPublications(filtered);
    }

    function filterByCategory(category, btn) {
      activeCategory = category;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('bg-primary', 'text-white', 'border-transparent');
        b.classList.add('bg-slate-100', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300', 'border', 'border-slate-200', 'dark:border-slate-700');
      });
      btn.classList.remove('bg-slate-100', 'dark:bg-slate-800', 'text-slate-600', 'dark:text-slate-300', 'border', 'border-slate-200', 'dark:border-slate-700');
      btn.classList.add('bg-primary', 'text-white', 'border-transparent');
      applyFilters();
    }

    function filterByKeyword(keyword, btn) {
      activeKeyword = activeKeyword === keyword ? null : keyword;
      renderKeywordFilters(collectKeywords(allPublications));
      applyFilters();
    }

    async function loadPublications() {
      try {
        const v = new Date().getTime();
        [allPublications, citationData] = await Promise.all([
          loadYAML(`_data/publications.yml?v=${v}`),
          fetch(`_data/citations.json?v=${v}`).then(r => r.ok ? r.json() : {}).catch(() => ({}))
        ]);

        allPublications.sort((a, b) => b.year - a.year);

        renderKeywordFilters(collectKeywords(allPublications));
        renderPublications(allPublications);
      } catch (e) {
        console.error('Failed to load publications:', e);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      initLayout('bibliography');
      loadPublications();
    });
  </script>
</body>
</html>
