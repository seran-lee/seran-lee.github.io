name: Update Citation Stats

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 UTC 00:00 (한국시간 09:00)
  workflow_dispatch:      # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Run fetch_citations.py
        run: python scripts/fetch_citations.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/citations.json
          git diff --cached --quiet || git commit -m "chore: update citation stats $(date +'%Y-%m-%d')"
          git push
